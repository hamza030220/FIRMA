<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="300" width="800" height="200" fill="url(#ground)"/>
  <!-- Pomegranate trees -->
  <g transform="translate(250,180)">
    <rect x="-8" y="50" width="16" height="70" fill="#795548"/>
    <circle cx="0" cy="15" r="55" fill="#388E3C"/>
    <!-- Pomegranates -->
    <circle cx="-20" cy="0" r="14" fill="#C62828"/>
    <circle cx="20" cy="-10" r="14" fill="#D32F2F"/>
    <circle cx="0" cy="25" r="12" fill="#C62828"/>
    <circle cx="-30" cy="20" r="10" fill="#D32F2F"/>
    <!-- Crown detail on fruit -->
    <polygon points="-20,-14 -18,-18 -22,-18" fill="#5D4037"/>
    <polygon points="20,-24 22,-28 18,-28" fill="#5D4037"/>
  </g>
  <g transform="translate(550,190)">
    <rect x="-8" y="45" width="16" height="65" fill="#795548"/>
    <circle cx="0" cy="12" r="50" fill="#43A047"/>
    <circle cx="-15" cy="5" r="13" fill="#C62828"/>
    <circle cx="18" cy="-5" r="13" fill="#D32F2F"/>
    <circle cx="5" cy="22" r="11" fill="#C62828"/>
    <polygon points="-15,-8 -13,-12 -17,-12" fill="#5D4037"/>
    <polygon points="18,-18 20,-22 16,-22" fill="#5D4037"/>
  </g>
  <!-- Open pomegranate -->
  <g transform="translate(400,310)">
    <path d="M-20,0 Q-22,-15 0,-18 Q22,-15 20,0 Z" fill="#C62828"/>
    <path d="M-18,0 Q-20,12 0,15 Q20,12 18,0 Z" fill="#D32F2F"/>
    <!-- Seeds -->
    <circle cx="-8" cy="-5" r="3" fill="#E53935"/><circle cx="0" cy="-8" r="3" fill="#EF5350"/>
    <circle cx="8" cy="-5" r="3" fill="#E53935"/><circle cx="-4" cy="0" r="3" fill="#EF5350"/>
    <circle cx="4" cy="0" r="3" fill="#E53935"/><circle cx="0" cy="5" r="3" fill="#EF5350"/>
  </g>
  <!-- Juice glass -->
  <g transform="translate(500,315)">
    <rect x="-8" y="-20" width="16" height="25" fill="none" stroke="#BDBDBD" stroke-width="2"/>
    <rect x="-6" y="-10" width="12" height="13" fill="#C62828" opacity="0.7"/>
    <rect x="-10" y="-22" width="20" height="4" fill="#BDBDBD"/>
  </g>
  <!-- Festive bunting -->
  <g opacity="0.6">
    <line x1="100" y1="60" x2="700" y2="60" stroke="#8D6E63" stroke-width="1"/>
    <polygon points="150,60 165,85 135,85" fill="#F44336"/>
    <polygon points="250,60 265,85 235,85" fill="#FFC107"/>
    <polygon points="350,60 365,85 335,85" fill="#4CAF50"/>
    <polygon points="450,60 465,85 435,85" fill="#2196F3"/>
    <polygon points="550,60 565,85 535,85" fill="#F44336"/>
    <polygon points="650,60 665,85 635,85" fill="#FFC107"/>
  </g>
  <!-- Sun -->
  <circle cx="80" cy="60" r="35" fill="#FFD54F" opacity="0.9"/>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Festival de la Grenade de Testour</text>
  <text x="400" y="445" text-anchor="middle" fill="#EF9A9A" font-family="Arial,sans-serif" font-size="18">Grenade et jus frais - Béja</text>
</svg>
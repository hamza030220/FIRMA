<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="320" width="800" height="180" fill="url(#ground)"/>
  <!-- Orange trees -->
  <g transform="translate(200,200)">
    <rect x="-8" y="50" width="16" height="70" fill="#795548"/>
    <circle cx="0" cy="20" r="60" fill="#388E3C"/>
    <circle cx="-20" cy="5" r="12" fill="#FF9800"/><circle cx="15" cy="-10" r="12" fill="#FF9800"/>
    <circle cx="30" cy="15" r="12" fill="#FF9800"/><circle cx="-10" cy="30" r="12" fill="#FF9800"/>
    <circle cx="20" cy="35" r="12" fill="#FFA726"/>
  </g>
  <g transform="translate(400,210)">
    <rect x="-8" y="45" width="16" height="65" fill="#795548"/>
    <circle cx="0" cy="15" r="55" fill="#43A047"/>
    <circle cx="-15" cy="0" r="12" fill="#FF9800"/><circle cx="20" cy="-5" r="12" fill="#FFA726"/>
    <circle cx="10" cy="25" r="12" fill="#FF9800"/><circle cx="-25" cy="20" r="12" fill="#FFA726"/>
  </g>
  <g transform="translate(600,205)">
    <rect x="-8" y="48" width="16" height="68" fill="#795548"/>
    <circle cx="0" cy="18" r="58" fill="#388E3C"/>
    <circle cx="-18" cy="3" r="12" fill="#FF9800"/><circle cx="22" cy="-8" r="12" fill="#FFA726"/>
    <circle cx="5" cy="30" r="12" fill="#FF9800"/><circle cx="-22" cy="25" r="12" fill="#FF9800"/>
    <circle cx="25" cy="20" r="12" fill="#FFA726"/>
  </g>
  <!-- Crate of oranges -->
  <g transform="translate(380,340)">
    <rect x="-30" y="0" width="60" height="30" fill="#8D6E63" rx="3"/>
    <rect x="-28" y="2" width="56" height="26" fill="#A1887F" rx="2"/>
    <circle cx="-10" cy="5" r="8" fill="#FF9800"/><circle cx="10" cy="5" r="8" fill="#FFA726"/>
    <circle cx="0" cy="-3" r="8" fill="#FF9800"/>
  </g>
  <!-- Sun -->
  <circle cx="700" cy="60" r="40" fill="#FFD54F" opacity="0.9"/>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Salon des Agrumes de Nabeul</text>
  <text x="400" y="445" text-anchor="middle" fill="#FFCC80" font-family="Arial,sans-serif" font-size="18">Oranges et citrons - Cap Bon</text>
</svg>
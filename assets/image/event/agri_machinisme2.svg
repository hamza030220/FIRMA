<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="320" width="800" height="180" fill="url(#ground)"/>
  <!-- Exhibition hall -->
  <g transform="translate(400,200)">
    <rect x="-180" y="-30" width="360" height="150" fill="#ECEFF1"/>
    <polygon points="-200,-30 0,-100 200,-30" fill="#B0BEC5"/>
    <!-- Windows -->
    <rect x="-150" y="0" width="40" height="50" fill="#81D4FA" rx="2"/>
    <rect x="-80" y="0" width="40" height="50" fill="#81D4FA" rx="2"/>
    <rect x="40" y="0" width="40" height="50" fill="#81D4FA" rx="2"/>
    <rect x="110" y="0" width="40" height="50" fill="#81D4FA" rx="2"/>
    <!-- Door -->
    <rect x="-20" y="40" width="40" height="80" fill="#5D4037" rx="3"/>
  </g>
  <!-- Tractor -->
  <g transform="translate(600,300)">
    <rect x="-30" y="-20" width="60" height="25" fill="#F44336" rx="3"/>
    <rect x="-45" y="-10" width="20" height="15" fill="#E53935" rx="2"/>
    <circle cx="-35" cy="10" r="12" fill="#424242"/>
    <circle cx="-35" cy="10" r="6" fill="#757575"/>
    <circle cx="20" cy="10" r="18" fill="#424242"/>
    <circle cx="20" cy="10" r="9" fill="#757575"/>
    <rect x="25" y="-25" width="3" height="15" fill="#424242"/>
    <rect x="15" y="-28" width="25" height="5" fill="#B0BEC5"/>
  </g>
  <!-- Small tractor -->
  <g transform="translate(180,310)">
    <rect x="-20" y="-15" width="40" height="18" fill="#FF9800" rx="2"/>
    <circle cx="-12" cy="8" r="10" fill="#424242"/>
    <circle cx="-12" cy="8" r="5" fill="#757575"/>
    <circle cx="15" cy="8" r="14" fill="#424242"/>
    <circle cx="15" cy="8" r="7" fill="#757575"/>
  </g>
  <!-- SALON sign -->
  <g transform="translate(400,110)">
    <rect x="-80" y="-15" width="160" height="30" fill="#1B5E20" rx="5"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">MACHINISME 2026</text>
  </g>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Salon du Machinisme Agricole</text>
  <text x="400" y="445" text-anchor="middle" fill="#FFCC80" font-family="Arial,sans-serif" font-size="18">Équipements modernes - Sousse</text>
</svg>
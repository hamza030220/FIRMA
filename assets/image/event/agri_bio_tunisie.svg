<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Organic pattern circles -->
  <g fill="none" stroke="#4CAF50" stroke-width="1" opacity="0.2">
    <circle cx="150" cy="150" r="80"/><circle cx="150" cy="150" r="100"/>
    <circle cx="650" cy="100" r="70"/><circle cx="650" cy="100" r="90"/>
    <circle cx="400" cy="400" r="60"/><circle cx="400" cy="400" r="80"/>
  </g>
  <!-- BIO label -->
  <g transform="translate(400,200)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#A5D6A7" stroke-width="3"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#81C784" stroke-width="1.5"/>
    <!-- Leaf inside -->
    <path d="M-25,-10 C-15,-35 15,-35 25,-10 C15,15 -15,15 -25,-10Z" fill="#66BB6A" opacity="0.8"/>
    <line x1="0" y1="-25" x2="0" y2="10" stroke="#388E3C" stroke-width="1.5"/>
    <text x="0" y="45" text-anchor="middle" fill="#C8E6C9" font-family="Arial,sans-serif" font-size="36" font-weight="bold">BIO</text>
  </g>
  <!-- Scattered leaves -->
  <g fill="#66BB6A" opacity="0.3">
    <ellipse cx="100" cy="350" rx="15" ry="8" transform="rotate(-30,100,350)"/>
    <ellipse cx="700" cy="380" rx="15" ry="8" transform="rotate(20,700,380)"/>
    <ellipse cx="200" cy="80" rx="12" ry="6" transform="rotate(-45,200,80)"/>
    <ellipse cx="600" cy="300" rx="12" ry="6" transform="rotate(35,600,300)"/>
    <ellipse cx="500" cy="100" rx="14" ry="7" transform="rotate(-15,500,100)"/>
  </g>
  <!-- Check marks for organic certification -->
  <g stroke="#A5D6A7" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5">
    <polyline points="100,250 108,258 125,240"/>
    <polyline points="650,250 658,258 675,240"/>
    <polyline points="100,290 108,298 125,280"/>
    <polyline points="650,290 658,298 675,280"/>
  </g>
  <!-- Banner -->
  <rect x="130" y="380" width="540" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="400" y="415" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="26" font-weight="bold">Salon Bio Tunisie</text>
  <text x="400" y="442" text-anchor="middle" fill="#A5D6A7" font-family="Arial,sans-serif" font-size="18">Agriculture biologique et labels - Hammamet</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="300" width="800" height="200" fill="url(#ground)"/>
  <!-- Market stalls -->
  <g transform="translate(200,200)">
    <rect x="-50" y="0" width="100" height="80" fill="#EFEBE9"/>
    <polygon points="-60,-5 0,-40 60,-5" fill="#D32F2F"/>
    <polygon points="-60,-5 0,-40 60,-5" fill="none" stroke="#B71C1C" stroke-width="1"/>
    <!-- Products -->
    <circle cx="-25" cy="30" r="10" fill="#FF9800"/>
    <circle cx="0" cy="30" r="10" fill="#FFB74D"/>
    <circle cx="25" cy="30" r="10" fill="#FF9800"/>
    <rect x="-30" y="50" width="20" height="15" fill="#8D6E63" rx="2"/>
    <rect x="10" y="50" width="20" height="15" fill="#795548" rx="2"/>
  </g>
  <g transform="translate(450,210)">
    <rect x="-50" y="0" width="100" height="70" fill="#EFEBE9"/>
    <polygon points="-60,-5 0,-35 60,-5" fill="#1565C0"/>
    <!-- Products -->
    <rect x="-30" y="15" width="20" height="30" fill="#689F38" rx="3"/>
    <rect x="-5" y="15" width="20" height="30" fill="#558B2F" rx="3"/>
    <rect x="20" y="15" width="20" height="30" fill="#689F38" rx="3"/>
    <circle cx="-20" cy="55" r="8" fill="#F44336"/>
    <circle cx="0" cy="55" r="8" fill="#4CAF50"/>
    <circle cx="20" cy="55" r="8" fill="#FFC107"/>
  </g>
  <!-- Baskets on ground -->
  <g transform="translate(650,300)">
    <path d="M-25,0 Q-30,15 -20,20 L20,20 Q30,15 25,0 Z" fill="#8D6E63"/>
    <circle cx="-8" cy="-3" r="6" fill="#8BC34A"/>
    <circle cx="8" cy="-5" r="6" fill="#66BB6A"/>
    <circle cx="0" cy="-8" r="6" fill="#4CAF50"/>
  </g>
  <!-- People silhouettes -->
  <g transform="translate(320,280)" opacity="0.3">
    <circle cx="0" cy="-10" r="8" fill="#424242"/>
    <rect x="-8" y="-2" width="16" height="22" fill="#424242" rx="4"/>
  </g>
  <g transform="translate(350,275)" opacity="0.3">
    <circle cx="0" cy="-10" r="8" fill="#424242"/>
    <rect x="-8" y="-2" width="16" height="22" fill="#424242" rx="4"/>
  </g>
  <!-- Mountains in background -->
  <polygon points="500,300 600,200 700,300" fill="#81C784" opacity="0.4"/>
  <polygon points="600,300 720,180 800,300" fill="#66BB6A" opacity="0.3"/>
  <!-- Sun -->
  <circle cx="100" cy="70" r="35" fill="#FFD54F" opacity="0.9"/>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Foire des Produits du Terroir</text>
  <text x="400" y="445" text-anchor="middle" fill="#FFCC80" font-family="Arial,sans-serif" font-size="18">Terroir de Siliana</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Abstract circuit/nature pattern -->
  <g stroke="#4CAF50" stroke-width="1.5" fill="none" opacity="0.3">
    <circle cx="400" cy="250" r="120"/>
    <circle cx="400" cy="250" r="160"/>
    <circle cx="400" cy="250" r="200"/>
    <line x1="400" y1="50" x2="400" y2="450"/>
    <line x1="200" y1="250" x2="600" y2="250"/>
    <line x1="260" y1="110" x2="540" y2="390"/>
    <line x1="540" y1="110" x2="260" y2="390"/>
  </g>
  <!-- Leaf icon in center -->
  <g transform="translate(400,230)">
    <path d="M0,-60 C30,-55 55,-30 60,0 C55,30 30,55 0,60 C-10,30 -10,-30 0,-60Z" fill="#66BB6A" opacity="0.8"/>
    <path d="M0,-60 C-30,-55 -55,-30 -60,0 C-55,30 -30,55 0,60 C10,30 10,-30 0,-60Z" fill="#43A047" opacity="0.8"/>
    <line x1="0" y1="-50" x2="0" y2="60" stroke="#2E7D32" stroke-width="2"/>
  </g>
  <!-- Globe dots -->
  <circle cx="350" cy="200" r="3" fill="#A5D6A7" opacity="0.5"/>
  <circle cx="420" cy="180" r="3" fill="#A5D6A7" opacity="0.5"/>
  <circle cx="380" cy="280" r="3" fill="#A5D6A7" opacity="0.5"/>
  <circle cx="450" cy="230" r="3" fill="#A5D6A7" opacity="0.5"/>
  <!-- Microphone icon -->
  <g transform="translate(400,120)" fill="#E8F5E9" opacity="0.6">
    <rect x="-8" y="-20" width="16" height="30" rx="8"/>
    <path d="M-15,5 C-15,18 -5,28 0,28 C5,28 15,18 15,5" stroke="#E8F5E9" fill="none" stroke-width="2"/>
    <line x1="0" y1="28" x2="0" y2="38" stroke="#E8F5E9" stroke-width="2"/>
    <line x1="-10" y1="38" x2="10" y2="38" stroke="#E8F5E9" stroke-width="2"/>
  </g>
  <!-- Banner -->
  <rect x="100" y="370" width="600" height="90" rx="12" fill="rgba(255,255,255,0.12)"/>
  <text x="400" y="405" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="24" font-weight="bold">Conférence Agriculture Durable</text>
  <text x="400" y="435" text-anchor="middle" fill="#A5D6A7" font-family="Arial,sans-serif" font-size="18">au Maghreb - Tunis 2026</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="300" width="800" height="200" fill="url(#ground)"/>
  <!-- Compost bin -->
  <g transform="translate(400,220)">
    <rect x="-60" y="-20" width="120" height="100" fill="#5D4037" rx="5"/>
    <rect x="-55" y="-15" width="110" height="90" fill="#795548" rx="3"/>
    <line x1="-55" y1="10" x2="55" y2="10" stroke="#6D4C41" stroke-width="2"/>
    <line x1="-55" y1="35" x2="55" y2="35" stroke="#6D4C41" stroke-width="2"/>
    <!-- Lid -->
    <rect x="-65" y="-30" width="130" height="15" fill="#4E342E" rx="4"/>
    <!-- Items sticking out -->
    <ellipse cx="-20" cy="-25" rx="8" ry="12" fill="#66BB6A"/>
    <ellipse cx="10" cy="-28" rx="6" ry="10" fill="#81C784"/>
    <circle cx="25" cy="-25" r="7" fill="#FF7043"/>
  </g>
  <!-- Leaves/scraps -->
  <ellipse cx="250" cy="310" rx="15" ry="8" fill="#81C784" transform="rotate(-20 250 310)"/>
  <ellipse cx="550" cy="320" rx="12" ry="7" fill="#A5D6A7" transform="rotate(15 550 320)"/>
  <circle cx="300" cy="330" r="6" fill="#FF7043" opacity="0.7"/>
  <circle cx="500" cy="315" r="5" fill="#FFA726" opacity="0.7"/>
  <!-- Worms -->
  <path d="M320,350 Q330,340 340,350 Q350,360 360,350" stroke="#E91E63" stroke-width="3" fill="none"/>
  <path d="M480,355 Q490,345 500,355 Q510,365 520,355" stroke="#E91E63" stroke-width="3" fill="none"/>
  <!-- Plant growing from compost -->
  <g transform="translate(400,295)">
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#4CAF50" stroke-width="3"/>
    <ellipse cx="-10" cy="-25" rx="10" ry="6" fill="#66BB6A" transform="rotate(-30 -10 -25)"/>
    <ellipse cx="10" cy="-30" rx="10" ry="6" fill="#66BB6A" transform="rotate(30 10 -30)"/>
  </g>
  <!-- Recycling arrows -->
  <g transform="translate(650,150)" opacity="0.6">
    <path d="M0,-20 A20,20 0 0,1 17,10" stroke="#4CAF50" stroke-width="4" fill="none"/>
    <polygon points="17,10 22,2 12,5" fill="#4CAF50"/>
    <path d="M17,10 A20,20 0 0,1 -17,10" stroke="#4CAF50" stroke-width="4" fill="none"/>
    <polygon points="-17,10 -12,18 -22,15" fill="#4CAF50"/>
    <path d="M-17,10 A20,20 0 0,1 0,-20" stroke="#4CAF50" stroke-width="4" fill="none"/>
    <polygon points="0,-20 -8,-15 -2,-22" fill="#4CAF50"/>
  </g>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Atelier Compostage Urbain</text>
  <text x="400" y="445" text-anchor="middle" fill="#A5D6A7" font-family="Arial,sans-serif" font-size="18">Recyclage organique - Tunis</text>
</svg>
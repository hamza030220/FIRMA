<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="280" width="800" height="220" fill="url(#field)"/>
  <!-- Barn -->
  <g transform="translate(150,180)">
    <rect x="-50" y="0" width="100" height="100" fill="#8D6E63"/>
    <polygon points="-60,-5 0,-50 60,-5" fill="#D84315"/>
    <rect x="-15" y="50" width="30" height="50" fill="#5D4037"/>
    <rect x="-40" y="20" width="20" height="20" fill="#FFF9C4" opacity="0.7"/>
    <rect x="20" y="20" width="20" height="20" fill="#FFF9C4" opacity="0.7"/>
  </g>
  <!-- Vegetable rows -->
  <g>
    <line x1="350" y1="290" x2="350" y2="265" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="350" cy="260" r="6" fill="#66BB6A"/>
    <line x1="400" y1="290" x2="400" y2="260" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="400" cy="255" r="7" fill="#43A047"/>
    <line x1="450" y1="290" x2="450" y2="268" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="450" cy="263" r="6" fill="#66BB6A"/>
    <line x1="500" y1="290" x2="500" y2="262" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="500" cy="257" r="7" fill="#43A047"/>
    <line x1="550" y1="290" x2="550" y2="267" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="550" cy="262" r="6" fill="#66BB6A"/>
  </g>
  <!-- Chicken -->
  <g transform="translate(620,260)">
    <ellipse cx="0" cy="0" rx="15" ry="12" fill="#F5F5F5"/>
    <circle cx="15" cy="-8" r="7" fill="#F5F5F5"/>
    <polygon points="22,-8 28,-10 22,-6" fill="#FF9800"/>
    <circle cx="18" cy="-10" r="2" fill="#212121"/>
    <polygon points="12,-15 15,-22 18,-15" fill="#F44336"/>
    <line x1="-5" y1="12" x2="-5" y2="20" stroke="#FF9800" stroke-width="2"/>
    <line x1="5" y1="12" x2="5" y2="20" stroke="#FF9800" stroke-width="2"/>
  </g>
  <!-- Bio label -->
  <g transform="translate(400,180)">
    <circle cx="0" cy="0" r="35" fill="#2E7D32"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">BIO</text>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#A5D6A7" stroke-width="2"/>
  </g>
  <!-- Sun -->
  <circle cx="700" cy="60" r="35" fill="#FFD54F" opacity="0.9"/>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Journée Portes Ouvertes Ferme Bio</text>
  <text x="400" y="445" text-anchor="middle" fill="#A5D6A7" font-family="Arial,sans-serif" font-size="18">Agriculture biologique - Zaghouan</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="320" width="800" height="180" fill="url(#ground)"/>
  <!-- Cracked earth pattern -->
  <g opacity="0.3">
    <line x1="100" y1="350" x2="200" y2="380" stroke="#6D4C41" stroke-width="2"/>
    <line x1="200" y1="380" x2="250" y2="350" stroke="#6D4C41" stroke-width="2"/>
    <line x1="400" y1="340" x2="450" y2="370" stroke="#6D4C41" stroke-width="2"/>
    <line x1="450" y1="370" x2="500" y2="350" stroke="#6D4C41" stroke-width="2"/>
    <line x1="600" y1="360" x2="650" y2="340" stroke="#6D4C41" stroke-width="2"/>
    <line x1="650" y1="340" x2="700" y2="370" stroke="#6D4C41" stroke-width="2"/>
  </g>
  <!-- Thermometer -->
  <g transform="translate(650,150)">
    <rect x="-6" y="-60" width="12" height="100" fill="#ECEFF1" rx="6"/>
    <circle cx="0" cy="50" r="15" fill="#F44336"/>
    <rect x="-3" y="-40" width="6" height="85" fill="#F44336"/>
    <!-- Scale lines -->
    <line x1="6" y1="-40" x2="12" y2="-40" stroke="#424242" stroke-width="1"/>
    <line x1="6" y1="-20" x2="12" y2="-20" stroke="#424242" stroke-width="1"/>
    <line x1="6" y1="0" x2="12" y2="0" stroke="#424242" stroke-width="1"/>
    <text x="18" y="-37" fill="#424242" font-size="10" font-family="Arial">40°</text>
  </g>
  <!-- Wilting plant -->
  <g transform="translate(300,290)">
    <line x1="0" y1="30" x2="0" y2="0" stroke="#8BC34A" stroke-width="3"/>
    <path d="M0,0 Q-15,-5 -25,5" stroke="#AED581" stroke-width="2" fill="none"/>
    <path d="M0,-5 Q15,-10 25,0" stroke="#AED581" stroke-width="2" fill="none"/>
    <ellipse cx="-25" cy="7" rx="8" ry="4" fill="#AED581" opacity="0.6" transform="rotate(20 -25 7)"/>
    <ellipse cx="25" cy="2" rx="8" ry="4" fill="#AED581" opacity="0.6" transform="rotate(-15 25 2)"/>
  </g>
  <!-- Healthy plant (adapted) -->
  <g transform="translate(500,280)">
    <line x1="0" y1="40" x2="0" y2="0" stroke="#4CAF50" stroke-width="3"/>
    <ellipse cx="-10" cy="-5" rx="10" ry="6" fill="#66BB6A" transform="rotate(-20 -10 -5)"/>
    <ellipse cx="10" cy="-12" rx="10" ry="6" fill="#66BB6A" transform="rotate(20 10 -12)"/>
    <ellipse cx="-8" cy="-20" rx="8" ry="5" fill="#81C784" transform="rotate(-15 -8 -20)"/>
    <circle cx="0" cy="-28" r="5" fill="#F44336"/>
  </g>
  <!-- Arrow between wilting and healthy = adaptation -->
  <g transform="translate(400,290)">
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#FFB74D" stroke-width="3"/>
    <polygon points="30,0 22,-6 22,6" fill="#FFB74D"/>
    <text x="0" y="-10" text-anchor="middle" fill="#E65100" font-size="10" font-family="Arial" font-weight="bold">ADAPTATION</text>
  </g>
  <!-- CO2 clouds -->
  <g transform="translate(200,100)" opacity="0.5">
    <circle cx="0" cy="0" r="20" fill="#BDBDBD"/>
    <circle cx="18" cy="-5" r="15" fill="#BDBDBD"/>
    <circle cx="-15" cy="-3" r="14" fill="#BDBDBD"/>
    <text x="0" y="5" text-anchor="middle" fill="#616161" font-size="10" font-family="Arial" font-weight="bold">CO₂</text>
  </g>
  <!-- Sun (hot/intense) -->
  <circle cx="400" cy="60" r="50" fill="#FF9800" opacity="0.6"/>
  <circle cx="400" cy="60" r="35" fill="#FFB74D"/>
  <!-- Banner -->
  <rect x="120" y="390" width="560" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="21" font-weight="bold">Conférence Changement Climatique</text>
  <text x="400" y="445" text-anchor="middle" fill="#FFCC80" font-family="Arial,sans-serif" font-size="18">Adaptation agricole - Médenine</text>
</svg>
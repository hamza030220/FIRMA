<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C5E1A5"/>
      <stop offset="100%" stop-color="#8BC34A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="290" width="800" height="210" fill="url(#meadow)"/>
  <!-- Modern beehive boxes -->
  <g transform="translate(250,240)">
    <rect x="-25" y="0" width="50" height="20" fill="#FFF9C4"/>
    <rect x="-25" y="20" width="50" height="20" fill="#FFF176"/>
    <rect x="-25" y="40" width="50" height="20" fill="#FFF9C4"/>
    <rect x="-30" y="-5" width="60" height="8" fill="#8D6E63"/>
    <rect x="-4" y="55" width="8" height="5" fill="#5D4037"/>
  </g>
  <g transform="translate(400,245)">
    <rect x="-25" y="0" width="50" height="20" fill="#FFF176"/>
    <rect x="-25" y="20" width="50" height="20" fill="#FFF9C4"/>
    <rect x="-25" y="40" width="50" height="15" fill="#FFF176"/>
    <rect x="-30" y="-5" width="60" height="8" fill="#8D6E63"/>
    <rect x="-4" y="50" width="8" height="5" fill="#5D4037"/>
  </g>
  <g transform="translate(550,242)">
    <rect x="-25" y="0" width="50" height="20" fill="#FFF9C4"/>
    <rect x="-25" y="20" width="50" height="20" fill="#FFF176"/>
    <rect x="-25" y="40" width="50" height="20" fill="#FFF9C4"/>
    <rect x="-30" y="-5" width="60" height="8" fill="#8D6E63"/>
    <rect x="-4" y="55" width="8" height="5" fill="#5D4037"/>
  </g>
  <!-- Bees -->
  <g><ellipse cx="300" cy="180" rx="8" ry="5" fill="#FFD54F"/>
    <line x1="296" y1="175" x2="288" y2="170" stroke="#90A4AE" stroke-width="1"/>
    <line x1="304" y1="175" x2="312" y2="170" stroke="#90A4AE" stroke-width="1"/></g>
  <g><ellipse cx="450" cy="160" rx="8" ry="5" fill="#FFD54F"/>
    <line x1="446" y1="155" x2="438" y2="150" stroke="#90A4AE" stroke-width="1"/>
    <line x1="454" y1="155" x2="462" y2="150" stroke="#90A4AE" stroke-width="1"/></g>
  <g><ellipse cx="520" cy="190" rx="8" ry="5" fill="#FFD54F"/>
    <line x1="516" y1="185" x2="508" y2="180" stroke="#90A4AE" stroke-width="1"/>
    <line x1="524" y1="185" x2="532" y2="180" stroke="#90A4AE" stroke-width="1"/></g>
  <!-- Honeycomb frame -->
  <g transform="translate(150,180)">
    <rect x="-20" y="-30" width="40" height="60" fill="#FFB300" rx="2"/>
    <rect x="-18" y="-28" width="36" height="56" fill="#FFC107"/>
    <!-- Hexagon pattern hint -->
    <circle cx="-6" cy="-15" r="5" fill="#FFD54F" opacity="0.6"/>
    <circle cx="6" cy="-15" r="5" fill="#FFD54F" opacity="0.6"/>
    <circle cx="0" cy="-5" r="5" fill="#FFD54F" opacity="0.6"/>
    <circle cx="-6" cy="5" r="5" fill="#FFD54F" opacity="0.6"/>
    <circle cx="6" cy="5" r="5" fill="#FFD54F" opacity="0.6"/>
  </g>
  <!-- Flowers -->
  <g>
    <line x1="650" y1="290" x2="650" y2="265" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="650" cy="260" r="6" fill="#E91E63"/><circle cx="650" cy="260" r="3" fill="#FFF176"/>
    <line x1="690" y1="290" x2="690" y2="270" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="690" cy="265" r="6" fill="#9C27B0"/><circle cx="690" cy="265" r="3" fill="#FFF176"/>
  </g>
  <!-- Smoker tool -->
  <g transform="translate(680,220)">
    <rect x="-6" y="0" width="12" height="25" fill="#B0BEC5" rx="2"/>
    <ellipse cx="0" cy="-5" rx="8" ry="8" fill="#90A4AE"/>
    <path d="M-3,-12 Q0,-25 3,-12" stroke="#BDBDBD" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Formation Apiculture Moderne</text>
  <text x="400" y="445" text-anchor="middle" fill="#FFE082" font-family="Arial,sans-serif" font-size="18">Ruches modernes - Bizerte</text>
</svg>
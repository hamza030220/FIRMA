<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFF8E1"/>
    </linearGradient>
    <linearGradient id="desert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D7CCC8"/>
      <stop offset="100%" stop-color="#BCAAA4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="300" width="800" height="200" fill="url(#desert)"/>
  <!-- Cactus with prickly pears -->
  <g transform="translate(300,180)">
    <!-- Main pad -->
    <ellipse cx="0" cy="0" rx="35" ry="55" fill="#4CAF50"/>
    <ellipse cx="0" cy="0" rx="33" ry="53" fill="#66BB6A"/>
    <!-- Left pad -->
    <ellipse cx="-45" cy="-20" rx="25" ry="40" fill="#4CAF50" transform="rotate(-20 -45 -20)"/>
    <ellipse cx="-45" cy="-20" rx="23" ry="38" fill="#66BB6A" transform="rotate(-20 -45 -20)"/>
    <!-- Right pad -->
    <ellipse cx="45" cy="-15" rx="25" ry="40" fill="#4CAF50" transform="rotate(15 45 -15)"/>
    <ellipse cx="45" cy="-15" rx="23" ry="38" fill="#66BB6A" transform="rotate(15 45 -15)"/>
    <!-- Prickly pear fruits -->
    <ellipse cx="10" cy="-50" rx="10" ry="14" fill="#E91E63"/>
    <ellipse cx="-10" cy="-45" rx="9" ry="12" fill="#C2185B"/>
    <ellipse cx="30" cy="-48" rx="9" ry="12" fill="#E91E63"/>
    <ellipse cx="-55" cy="-55" rx="8" ry="11" fill="#C2185B"/>
    <ellipse cx="55" cy="-48" rx="8" ry="11" fill="#E91E63"/>
    <!-- Spines -->
    <line x1="5" y1="20" x2="15" y2="25" stroke="#FFF9C4" stroke-width="1"/>
    <line x1="-5" y1="30" x2="-15" y2="35" stroke="#FFF9C4" stroke-width="1"/>
    <line x1="0" y1="-15" x2="10" y2="-20" stroke="#FFF9C4" stroke-width="1"/>
  </g>
  <!-- Another smaller cactus -->
  <g transform="translate(550,230)">
    <ellipse cx="0" cy="0" rx="25" ry="40" fill="#4CAF50"/>
    <ellipse cx="0" cy="0" rx="23" ry="38" fill="#66BB6A"/>
    <ellipse cx="5" cy="-35" rx="8" ry="11" fill="#E91E63"/>
    <ellipse cx="-8" cy="-30" rx="7" ry="10" fill="#C2185B"/>
  </g>
  <!-- Basket of figs -->
  <g transform="translate(450,310)">
    <path d="M-30,0 Q-35,20 -25,25 L25,25 Q35,20 30,0 Z" fill="#8D6E63"/>
    <ellipse cx="-10" cy="-3" rx="10" ry="8" fill="#E91E63"/>
    <ellipse cx="10" cy="-5" rx="10" ry="8" fill="#C2185B"/>
    <ellipse cx="0" cy="-10" rx="10" ry="8" fill="#E91E63"/>
  </g>
  <!-- Sun (hot) -->
  <circle cx="680" cy="70" r="45" fill="#FF9800" opacity="0.8"/>
  <circle cx="680" cy="70" r="35" fill="#FFB74D"/>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Festival des Figues de Barbarie</text>
  <text x="400" y="445" text-anchor="middle" fill="#F48FB1" font-family="Arial,sans-serif" font-size="18">Cactus et fruits - Kasserine</text>
</svg>
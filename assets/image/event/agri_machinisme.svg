<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AED581"/>
      <stop offset="100%" stop-color="#689F38"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#E3F2FD"/>
  <rect y="320" width="800" height="180" fill="url(#field)"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <circle cx="150" cy="80" r="30"/><circle cx="185" cy="75" r="40"/><circle cx="220" cy="82" r="28"/>
    <circle cx="550" cy="60" r="25"/><circle cx="580" cy="55" r="35"/><circle cx="610" cy="62" r="22"/>
  </g>
  <!-- Tractor body -->
  <g transform="translate(350,240)">
    <!-- Body -->
    <rect x="-60" y="0" width="120" height="50" fill="#F44336" rx="5"/>
    <rect x="-80" y="15" width="30" height="35" fill="#D32F2F" rx="3"/>
    <!-- Cab -->
    <rect x="10" y="-35" width="50" height="40" fill="#42A5F5" rx="3" opacity="0.7"/>
    <rect x="15" y="-30" width="40" height="25" fill="#BBDEFB" rx="2"/>
    <!-- Exhaust -->
    <rect x="-70" y="-15" width="8" height="20" fill="#616161" rx="2"/>
    <!-- Big rear wheel -->
    <circle cx="-30" cy="55" r="35" fill="#37474F"/>
    <circle cx="-30" cy="55" r="28" fill="#455A64"/>
    <circle cx="-30" cy="55" r="8" fill="#78909C"/>
    <!-- Wheel treads -->
    <g stroke="#37474F" stroke-width="3" fill="none">
      <line x1="-30" y1="22" x2="-30" y2="28"/><line x1="-30" y1="82" x2="-30" y2="88"/>
      <line x1="3" y1="55" x2="-3" y2="55"/><line x1="-63" y1="55" x2="-57" y2="55"/>
    </g>
    <!-- Small front wheel -->
    <circle cx="50" cy="55" r="22" fill="#37474F"/>
    <circle cx="50" cy="55" r="16" fill="#455A64"/>
    <circle cx="50" cy="55" r="5" fill="#78909C"/>
  </g>
  <!-- Field rows -->
  <g stroke="#558B2F" stroke-width="2" opacity="0.5">
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="380" x2="800" y2="380"/>
    <line x1="0" y1="410" x2="800" y2="410"/><line x1="0" y1="440" x2="800" y2="440"/>
  </g>
  <!-- Banner -->
  <rect x="130" y="390" width="540" height="70" rx="10" fill="rgba(0,0,0,0.65)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Exposition Machinisme Agricole</text>
  <text x="400" y="445" text-anchor="middle" fill="#FFCC80" font-family="Arial,sans-serif" font-size="18">Parc des Expositions du Kram</text>
</svg>
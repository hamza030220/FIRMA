<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="300" width="800" height="200" fill="url(#ground)"/>
  <!-- Mediterranean coast line -->
  <path d="M0,300 Q200,280 400,295 Q600,310 800,290" fill="#42A5F5" opacity="0.3"/>
  <!-- Spiral garden beds -->
  <g transform="translate(400,240)">
    <path d="M0,0 Q30,-30 50,0 Q70,35 40,55 Q5,75 -20,50 Q-45,25 -20,0 Q0,-20 20,-5" stroke="#795548" stroke-width="4" fill="none"/>
    <!-- Plants in spiral -->
    <circle cx="10" cy="-10" r="5" fill="#66BB6A"/>
    <circle cx="35" cy="5" r="5" fill="#43A047"/>
    <circle cx="40" cy="35" r="5" fill="#81C784"/>
    <circle cx="15" cy="50" r="5" fill="#66BB6A"/>
    <circle cx="-10" cy="35" r="5" fill="#43A047"/>
    <circle cx="-10" cy="10" r="5" fill="#81C784"/>
  </g>
  <!-- Raised beds -->
  <g transform="translate(180,280)">
    <rect x="-40" y="-15" width="80" height="30" fill="#8D6E63" rx="3"/>
    <rect x="-38" y="-20" width="76" height="10" fill="#66BB6A"/>
    <line x1="-20" y1="-20" x2="-20" y2="-35" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="-20" cy="-38" r="4" fill="#F44336"/>
    <line x1="0" y1="-20" x2="0" y2="-38" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="0" cy="-41" r="4" fill="#FF9800"/>
    <line x1="20" y1="-20" x2="20" y2="-33" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="20" cy="-36" r="4" fill="#F44336"/>
  </g>
  <g transform="translate(620,275)">
    <rect x="-40" y="-15" width="80" height="30" fill="#8D6E63" rx="3"/>
    <rect x="-38" y="-20" width="76" height="10" fill="#81C784"/>
    <line x1="-15" y1="-20" x2="-15" y2="-36" stroke="#4CAF50" stroke-width="2"/>
    <ellipse cx="-15" cy="-40" rx="6" ry="4" fill="#66BB6A"/>
    <line x1="10" y1="-20" x2="10" y2="-40" stroke="#4CAF50" stroke-width="2"/>
    <ellipse cx="10" cy="-44" rx="6" ry="4" fill="#66BB6A"/>
  </g>
  <!-- Mulch layer -->
  <ellipse cx="400" cy="310" rx="80" ry="10" fill="#8D6E63" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="680" cy="70" r="40" fill="#FFD54F" opacity="0.9"/>
  <!-- Banner -->
  <rect x="150" y="390" width="500" height="70" rx="10" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="420" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Atelier Permaculture Méditerranéenne</text>
  <text x="400" y="445" text-anchor="middle" fill="#A5D6A7" font-family="Arial,sans-serif" font-size="18">Design durable - Hammamet</text>
</svg>